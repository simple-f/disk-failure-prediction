version: '3.8'

services:
  # API 服务
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Dashboard
  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    command: streamlit run app/dashboard.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api

  # 数据采集
  collector:
    build: .
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    command: python src/data_collector.py
    depends_on:
      - api

  # 数据库（可选）
  postgres:
    image: postgres:14-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=smart_data
      - POSTGRES_USER=smartuser
      - POSTGRES_PASSWORD=smartpass
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data:
