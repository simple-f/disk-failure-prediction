# 硬盘故障预测系统配置文件

# 数据采集
data_collection:
  # 采集频率（小时）
  interval_hours: 24
  # 数据库路径
  db_path: "data/smart_data.db"
  # 导出 CSV 路径
  export_path: "data/raw/smart_data.csv"

# 特征工程
feature_engineering:
  # SMART 属性列表
  smart_attributes:
    - smart_5_raw
    - smart_187_raw
    - smart_188_raw
    - smart_197_raw
    - smart_198_raw
    - smart_1_raw
    - smart_3_raw
    - smart_4_raw
    - smart_7_raw
    - smart_9_raw
    - smart_10_raw
    - smart_12_raw
    - smart_194_raw
    - smart_199_raw
    - smart_201_raw
    - smart_240_raw
    - smart_241_raw
    - smart_242_raw
    - smart_184_raw
  
  # 时间窗口（天）
  windows:
    - 7
    - 14
    - 30
  
  # 滞后特征（天）
  lags:
    - 1
    - 3
    - 7

# 模型训练
model:
  # LightGBM 参数
  lightgbm:
    objective: binary
    metric: auc
    verbose: -1
    num_boost_round: 1000
    early_stopping_rounds: 50
  
  # 贝叶斯调优参数
  bayesian_optimization:
    n_iter: 50
    init_points: 10
    random_state: 42
  
  # 交叉验证
  cross_validation:
    n_splits: 5
    shuffle: true
    random_state: 42

# 预测服务
api:
  host: 0.0.0.0
  port: 8000
  reload: true

# Dashboard
dashboard:
  port: 8501
  theme: dark

# 告警配置
alert:
  # 飞书 webhook URL
  feishu_webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/YOUR_WEBHOOK"
  
  # 风险阈值
  thresholds:
    high: 0.7
    medium: 0.4
    low: 0.0
  
  # 告警频率（分钟）
  cooldown_minutes: 60

# 日志配置
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: logs/app.log
  max_bytes: 10485760  # 10MB
  backup_count: 5
