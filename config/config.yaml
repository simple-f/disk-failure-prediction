# 硬盘故障预测系统配置文件（OBS + PySpark 版本）

# OBS 配置
obs:
  # OBS 端点（华为云 OBS 示例）
  endpoint: "obs.cn-north-4.myhuaweicloud.com"
  # 桶名
  bucket_name: "your-bucket-name"
  # 访问密钥（建议从环境变量读取）
  # access_key: ${OBS_ACCESS_KEY}
  # secret_key: ${OBS_SECRET_KEY}
  
  # 数据路径
  paths:
    raw_data: "obs://your-bucket-name/smart/raw/"
    processed_data: "obs://your-bucket-name/smart/processed/"
    features: "obs://your-bucket-name/smart/features/"
    models: "obs://your-bucket-name/smart/models/"

# Spark 配置
spark:
  # Spark Master
  master: "yarn"  # 或 "local[*]", "spark://host:7077"
  
  # 应用名称
  app_name: "DiskFailurePrediction"
  
  # 资源配置
  executor_cores: 4
  executor_memory: "8g"
  driver_memory: "4g"
  num_executors: 10
  
  # 动态资源分配
  dynamic_allocation:
    enabled: true
    min_executors: 2
    max_executors: 50
  
  # 序列化
  serializer: "org.apache.spark.serializer.KryoSerializer"
  
  # SQL 配置
  sql:
    shuffle_partitions: 200
    broadcast_timeout: 600

# 特征工程
feature_engineering:
  # SMART 属性列表
  smart_attributes:
    - smart_5_raw
    - smart_187_raw
    - smart_188_raw
    - smart_197_raw
    - smart_198_raw
    - smart_1_raw
    - smart_3_raw
    - smart_4_raw
    - smart_7_raw
    - smart_9_raw
    - smart_10_raw
    - smart_12_raw
    - smart_194_raw
    - smart_199_raw
    - smart_201_raw
    - smart_240_raw
    - smart_241_raw
    - smart_242_raw
    - smart_184_raw
  
  # 时间窗口（天）
  windows:
    - 7
    - 14
    - 30
  
  # 滞后特征（天）
  lags:
    - 1
    - 3
    - 7
  
  # 分区列
  partition_by:
    - year
    - month

# 模型训练
model:
  # LightGBM on Spark
  lightgbm:
    objective: binary
    metric: auc
    num_leaves: 50
    max_depth: 10
    learning_rate: 0.05
    min_child_samples: 20
    subsample: 0.8
    colsample_bytree: 0.8
    num_iterations: 1000
    early_stopping_round: 50
  
  # 贝叶斯调优
  bayesian_optimization:
    n_iter: 30
    init_points: 5
  
  # 交叉验证
  cross_validation:
    num_folds: 5
    parallelism: 4

# 数据存储
storage:
  # 数据格式（推荐 parquet）
  format: parquet
  
  # 压缩编码
  compression: snappy
  
  # 分区策略
  partition:
    enabled: true
    columns:
      - year
      - month

# 预测服务
api:
  host: 0.0.0.0
  port: 8000
  workers: 4

# Dashboard
dashboard:
  port: 8501
  theme: dark

# 告警配置
alert:
  # 飞书 webhook
  feishu_webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/YOUR_WEBHOOK"
  
  # 风险阈值
  thresholds:
    high: 0.7
    medium: 0.4
  
  # 告警频率（分钟）
  cooldown_minutes: 60

# 日志配置
logging:
  level: INFO
  file: logs/app.log
  max_bytes: 104857600  # 100MB
  backup_count: 10
